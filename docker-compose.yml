services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8080:80"
    environment:
      CI_ENVIRONMENT: development
      database_default_hostname: db
      database_default_database: furanchofinder
      database_default_username: furanchouser
      database_default_password: furanchopass
      database_default_DBDriver: MySQLi
      database_default_port: 3306
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: furanchofinder
      MARIADB_USER: furanchouser
      MARIADB_PASSWORD: furanchopass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
